{% set name = "shapash" %}
{% set version = "2.8.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/shapash-{{ version }}.tar.gz
  sha256: 560999a1c329ad38fe2abd39ac12cf8896048eb67f2a27aa900fd69d4528604d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pytest-runner
    - pip
    - setuptools
    - wheel
  run:
    - python >={{ python_min }},<3.14
    - category_encoders >=2.6.0
    - dash-bootstrap-components >=1.1.0
    - dash-core-components >=2.0.0
    - dash-daq >=0.5.0
    - dash-html-components >=2.0.0
    - dash-renderer ==1.8.3
    - dash-table >=5.0.0
    - dash <3.0.0,>=2.3.1
    - flask >=1.0.4
    - matplotlib-base >=3.8.4
    - nbformat >5.8.0
    - numba >=0.60.0
    - numpy >=2.0.0
    - pandas <3.0.0,>=2.2.2
    - plotly <6.0.0,>=5.0.0
    - scikit-learn <1.6.0,>=1.4.2
    - scipy >=1.13.0
    - shap >=0.46.0
    - shapely >=2.0.0
    # This list should be identical to the list in shapash/report/__init__.py
    - ipython
    - nbconvert >=7.2.0
    - papermill >=2.5.0
    - jupyter_client >=8.3.0
